<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 80">
  <defs>
    <radialGradient id="ovalGrad" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#d42020"/>
      <stop offset="100%" stop-color="#8b0000"/>
    </radialGradient>
  </defs>

  <!-- Red oval -->
  <ellipse cx="48" cy="40" rx="44" ry="32" fill="url(#ovalGrad)"/>
  <!-- Thin dark outline at bottom of oval for depth -->
  <ellipse cx="48" cy="40" rx="44" ry="32" fill="none" stroke="#6b0000" stroke-width=".8" opacity=".4"/>

  <!-- White mountain/chevron inside oval -->
  <path d="M20 58 L48 16 L60 34 L66 26 L76 58" fill="none" stroke="#fff" stroke-width="5" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- Thinner inner line for crispness -->
  <path d="M22 56 L48 18 L59 34 L65 27 L74 56" fill="none" stroke="#fff" stroke-width="3" stroke-linejoin="round" stroke-linecap="round" opacity=".5"/>

  <!-- ATI text — white for dark header -->
  <text x="104" y="56" font-family="'Arial Black','Impact',sans-serif" font-weight="900" font-size="56" fill="#fff" letter-spacing="2">ATI</text>

  <!-- WORKSITE SOLUTIONS subtitle -->
  <text x="106" y="72" font-family="Arial,Helvetica,sans-serif" font-weight="700" font-size="13" fill="#aaa" letter-spacing="3">WORKSITE SOLUTIONS</text>
</svg>
